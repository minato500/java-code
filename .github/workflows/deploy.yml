name: Build Test Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Unit Tests
        run: mvn clean test

      - name: Build Application
        run: mvn clean package

      - name: Update RESULT.md
        run: |
          echo "| $(date -u '+%Y-%m-%d %H:%M:%S UTC') | PASS |" >> RESULT.md

      - name: Commit RESULT.md
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add RESULT.md
          git commit -m "Update deployment history" || true

      - name: Push RESULT.md
        run: git push

      - name: Upload JAR To EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/opt/myapp"

      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Stopping old application..."

            pkill -f 'springboot-ci-cd' || true

            sleep 5

            echo "Searching for JAR..."

            JAR=$(find /opt/myapp -name "*.jar" | head -1)

            echo "Found JAR: $JAR"

            if [ -z "$JAR" ]; then
              echo "JAR file not found"
              exit 1
            fi

            echo "Starting application..."

            nohup java -jar "$JAR" \
              --server.port=8000 \
              > /opt/myapp/app.log 2>&1 < /dev/null &

            sleep 15

            echo "Application log:"
            cat /opt/myapp/app.log || true

            echo "Running Java processes:"
            ps -ef | grep java

            echo "Checking port 8000:"
            ss -tulpn | grep 8000 || true