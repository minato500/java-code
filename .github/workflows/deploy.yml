name: Build Test Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Tests
        run: mvn clean test

      - name: Build Jar
        run: mvn clean package

      - name: Update Report
        run: |
          echo "| $(date -u '+%Y-%m-%d %H:%M:%S UTC') | PASS |" >> RESULT.md

      - name: Commit Report
        run: |
          git config user.name "minato500"
          git config user.email github-actions@github.com

          git add RESULT.md
          git commit -m "Update deployment report" || true

      - name: Push Report
        run: git push

      - name: Upload Jar To EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/opt/myapp"

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f '.jar' || true

            JAR=$(find /opt/myapp -name "*.jar" | head -1)

            nohup java -jar $JAR \
              > /opt/myapp/app.log 2>&1 &